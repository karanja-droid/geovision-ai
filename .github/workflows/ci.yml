name: CI

on:
  push:
    branches: [ main, 'setup/*', 'feature/*' ]
  pull_request:
    branches: [ main ]

jobs:
  lint-type-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v2
      - name: Set up Python
        run: uv python install 3.11
      - name: Install project (dev)
        run: uv sync --extra dev
      - name: Ruff
        run: uv run ruff check .
      - name: Mypy
        run: uv run mypy backend streamlit_app || true
      - name: Pytest (basic)
        run: uv run pytest -q --tb=short
